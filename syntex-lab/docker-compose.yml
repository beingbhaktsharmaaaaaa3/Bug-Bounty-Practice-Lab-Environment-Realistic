version: '3.8'

# ============================================================
#  SYNTEX SOLUTIONS — VULNERABLE LAB  v3.0
#  ⚠️  FOR LOCAL USE ONLY — DO NOT EXPOSE TO ANY NETWORK
#  Ports are bound to 127.0.0.1 to prevent accidental exposure
# ============================================================

services:
  db:
    image: postgres:15-alpine
    container_name: syntex_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: syntex_db
      POSTGRES_USER: syntex_admin
      POSTGRES_PASSWORD: Synx@2024!Prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "127.0.0.1:5432:5432"   # localhost only — no external DB exposure
    networks:
      - syntex_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syntex_admin -d syntex_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: ./backend
    container_name: syntex_app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: syntex_db
      DB_USER: syntex_admin
      DB_PASS: Synx@2024!Prod
      SESSION_SECRET: syntex_session_secret_2024
      JWT_SECRET: secret123
      # LAB_MODE: easy | medium | hard | realistic
      LAB_MODE: easy
      UPLOAD_DIR: /app/public/uploads
      MAX_FILE_SIZE: 10485760
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SMTP_USER: noreply@syntex.local
      SMTP_PASS: mailpass2024
      AWS_ACCESS_KEY: AKIAIOSFODNN7EXAMPLE
      AWS_SECRET_KEY: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
      S3_BUCKET: syntex-uploads-prod
      S3_REGION: us-east-1
      STRIPE_SK: sk_live_51Hfake_this_is_for_lab_only_do_not_use
      STRIPE_PK: pk_live_51Hfake_this_is_for_lab_only_do_not_use
      INTERNAL_API_KEY: int_key_9f8e7d6c5b4a3z2y1x
      INTERNAL_API_URL: http://10.0.0.50:8080
      ADMIN_EMAIL: admin@syntex.local
      FLAG_SECRET: syntex_flag_master_key_2024
    volumes:
      - ./backend/public/uploads:/app/public/uploads
    ports:
      - "127.0.0.1:3000:3000"   # localhost only
    depends_on:
      db:
        condition: service_healthy
    networks:
      - syntex_net

  nginx:
    image: nginx:alpine
    container_name: syntex_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:80:80"       # localhost only
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - syntex_net

volumes:
  postgres_data:

networks:
  syntex_net:
    driver: bridge
