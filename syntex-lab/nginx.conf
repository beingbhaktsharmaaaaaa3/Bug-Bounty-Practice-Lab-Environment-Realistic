events {
    worker_connections 1024;
}

http {
    # Intentional: Server version exposed in headers
    server_tokens on;

    upstream app {
        server app:3000;
    }

    # Main application - syntex.local
    server {
        listen 80;
        server_name syntex.local www.syntex.local localhost;

        # Intentional: Missing security headers (HSTS, X-Frame-Options, CSP, etc.)
        # add_header X-Frame-Options "SAMEORIGIN";
        # add_header X-Content-Type-Options "nosniff";
        # add_header Content-Security-Policy "...";

        location / {
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Intentional: Forwarded header trusted by app (rate limit bypass)
            proxy_set_header X-Forwarded-For $http_x_forwarded_for;
        }
    }

    # API subdomain - api.syntex.local
    server {
        listen 80;
        server_name api.syntex.local;

        location / {
            proxy_pass http://app/api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # Admin subdomain - admin.syntex.local
    server {
        listen 80;
        server_name admin.syntex.local;

        location / {
            proxy_pass http://app/admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # Staging subdomain - staging.syntex.local
    # Intentional: Staging is accessible and has weaker security
    server {
        listen 80;
        server_name staging.syntex.local;

        location / {
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Syntex-Env "staging";
        }
    }

    # Dev subdomain - dev.syntex.local
    server {
        listen 80;
        server_name dev.syntex.local;

        location / {
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Syntex-Env "development";
        }
    }

    # Mail server simulation - mail.syntex.local (returns 503 - "dead" service for recon)
    server {
        listen 80;
        server_name mail.syntex.local;
        return 503 "Service Temporarily Unavailable";
    }

    # Backup server simulation - backup.syntex.local (dead)
    server {
        listen 80;
        server_name backup.syntex.local;
        return 503 "Service Temporarily Unavailable";
    }

    # VPN simulation - vpn.syntex.local (dead, but reveals it exists)
    server {
        listen 80;
        server_name vpn.syntex.local;
        return 403 "Forbidden";
    }

    # Intranet simulation - intranet.syntex.local
    server {
        listen 80;
        server_name intranet.syntex.local;
        return 401 "Authentication Required";
    }
}
